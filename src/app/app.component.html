<div class="h-screen bg-white dark:bg-gray-900 transition-colors duration-200">
  <div class="flex h-full w-full">
    <app-sidebar
      [class.sidebar-collapsed]="isSidebarCollapsed()"
      [class.sidebar-expanded]="!isSidebarCollapsed()"
      class="sidebar-collapsible"
      (closeSidebar)="toggleSidebar()"
      (toggleSidebar)="toggleSidebar()"
    ></app-sidebar>

    <div class="flex-1 flex flex-col relative">
      @if (isSidebarCollapsed()) {
        <button
          (click)="toggleSidebar()"
          class="sidebar-toggle-btn block md:hidden"
          aria-label="Open sidebar"
          style="display: none"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>
      }

      <app-chat-container [isSidebarCollapsed]="isSidebarCollapsed()"></app-chat-container>
    </div>
  </div>
</div>
