@if (isAuthLoading()) {
  <div class="h-screen bg-white dark:bg-gray-900 flex items-center justify-center">
    <div class="flex flex-col items-center space-y-4">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2"></div>
      <p class="text-gray-600 dark:text-gray-400">Repeersisting...</p>
    </div>
  </div>
} @else if (isLoginRoute()) {
  <router-outlet></router-outlet>
} @else {
  <div class="h-screen bg-white dark:bg-gray-900 transition-colors duration-200">
    <div class="flex h-full w-full">
      <app-sidebar
        [class.sidebar-collapsed]="isSidebarCollapsed()"
        [class.sidebar-expanded]="!isSidebarCollapsed()"
        [isCollapsed]="isSidebarCollapsed"
        class="sidebar-collapsible"
        (closeSidebar)="toggleSidebar()"
        (toggleSidebar)="toggleSidebar()"
      ></app-sidebar>

      <div class="flex-1 relative">
        <app-chat-container
          [isSidebarCollapsed]="isSidebarCollapsed()"
          [isMobile]="isMobile()"
          (toggleSidebar)="toggleSidebar()"
        ></app-chat-container>
      </div>
    </div>

    <app-footer></app-footer>
  </div>
}
