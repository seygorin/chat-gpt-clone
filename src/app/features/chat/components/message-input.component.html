<div class="input-wrapper">
  <textarea
    #messageInput
    [(ngModel)]="messageText"
    (keydown)="onKeyDown($event)"
    (input)="onInput()"
    placeholder="Ask anything"
    class="chat-input"
    [rows]="textareaRows()"
    [disabled]="isLoading()"
  ></textarea>

  <button
    (click)="openSettingsModal()"
    class="settings-button"
    [disabled]="isLoading()"
    aria-label="Open settings"
  >
    <i class="fas fa-plus w-4 h-4" aria-hidden="true"></i>
  </button>

  <button
    (click)="sendMessage()"
    [disabled]="!canSend()"
    class="send-button-mobile"
    [class]="getSendButtonClasses()"
    aria-label="Send message"
  >
    @if (isLoading()) {
      <i class="fas fa-spinner fa-spin w-5 h-5 text-white" aria-hidden="true"></i>
    } @else {
      <i class="fas fa-arrow-up w-5 h-5 text-white" aria-hidden="true"></i>
    }
  </button>
</div>

@if (isLoading()) {
  <div class="mt-2 text-sm text-gray-500 dark:text-gray-400 flex items-center space-x-2">
    <i class="fas fa-spinner fa-spin w-4 h-4" aria-hidden="true"></i>
    <span>Sending message...</span>
  </div>
}

<app-settings-modal
  [isOpen]="isSettingsModalOpen()"
  (closeModal)="closeSettingsModal()"
></app-settings-modal>
