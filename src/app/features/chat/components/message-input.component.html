<div class="input-wrapper">
  <textarea
    #messageInput
    [(ngModel)]="messageText"
    (keydown)="onKeyDown($event)"
    placeholder="Message ChatGPT..."
    class="chat-input"
    [class.pl-12]="true"
    [class.pr-12]="isMobile()"
    rows="1"
    [disabled]="isLoading()"
  ></textarea>

  <button
    (click)="openSettingsModal()"
    class="settings-button absolute left-3 bottom-3 p-2 transition-all duration-200 bg-transparent"
    [disabled]="isLoading()"
    aria-label="Open settings"
  >
    <i class="fas fa-gear w-5 h-5" aria-hidden="true"></i>
  </button>

  <button
    (click)="sendMessage()"
    [disabled]="!canSend()"
    class="send-button-mobile absolute right-3 bottom-3 p-2 transition-all duration-200 bg-transparent"
    [class]="getSendButtonClasses()"
  >
    @if (isLoading()) {
      <i class="fas fa-spinner fa-spin w-5 h-5" aria-hidden="true"></i>
    } @else {
      <i class="fas fa-paper-plane w-5 h-5" aria-hidden="true"></i>
    }
  </button>
</div>

@if (isLoading()) {
  <div class="mt-2 text-sm text-gray-500 dark:text-gray-400 flex items-center space-x-2">
    <i class="fas fa-spinner fa-spin w-4 h-4" aria-hidden="true"></i>
    <span>Sending message...</span>
  </div>
}

<app-settings-modal
  [isOpen]="isSettingsModalOpen()"
  (closeModal)="closeSettingsModal()"
></app-settings-modal>
