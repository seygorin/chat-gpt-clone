<div class="input-wrapper">
  <textarea
    #messageInput
    [(ngModel)]="messageText"
    (keydown)="onKeyDown($event)"
    placeholder="Message ChatGPT..."
    class="chat-input"
    [class.pl-12]="true"
    [class.pr-12]="isMobile()"
    rows="1"
    [disabled]="isLoading()"
  ></textarea>

  <button
    (click)="openSettingsModal()"
    class="settings-button absolute left-3 bottom-3 p-2 transition-all duration-200 bg-transparent"
    [disabled]="isLoading()"
    aria-label="Open settings"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 6v6m0 0v6m0-6h6m-6 0H6"
      />
    </svg>
  </button>

  <button
    (click)="sendMessage()"
    [disabled]="!canSend()"
    class="send-button-mobile absolute right-3 bottom-3 p-2 transition-all duration-200 bg-transparent"
    [class]="getSendButtonClasses()"
  >
    @if (isLoading()) {
      <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    } @else {
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
        />
      </svg>
    }
  </button>
</div>

@if (isLoading()) {
  <div class="mt-2 text-sm text-gray-500 dark:text-gray-400 flex items-center space-x-2">
    <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle
        class="opacity-25"
        cx="12"
        cy="12"
        r="10"
        stroke="currentColor"
        stroke-width="4"
      ></circle>
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
      ></path>
    </svg>
    <span>Sending message...</span>
  </div>
}

<app-settings-modal
  [isOpen]="isSettingsModalOpen()"
  (closeModal)="closeSettingsModal()"
></app-settings-modal>
