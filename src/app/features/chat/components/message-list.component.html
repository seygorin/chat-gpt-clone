<div class="h-full overflow-y-auto p-4 space-y-6" #messageContainer>
  @for (message of messages(); track message.id) {
    <div class="message-bubble animate-fade-in-up" [class]="getMessageClasses(message)">
      <div class="flex items-start space-x-3">
        <div class="flex-shrink-0">
          <div class="avatar" [class]="getAvatarClasses(message.role)">
            @if (message.role === 'user') {
              <i class="fas fa-user w-5 h-5 text-white" aria-hidden="true"></i>
            } @else {
              <i class="fas fa-robot w-5 h-5 text-white" aria-hidden="true"></i>
            }
          </div>
        </div>

        <div class="flex-1 min-w-0">
          <div class="flex items-center space-x-2 mb-2">
            <span class="text-sm font-semibold text-gray-900 dark:text-gray-100">
              {{ message.role === 'user' ? 'You' : 'Assistant' }}
            </span>
            @if (showTimestamps()) {
              <span class="text-xs text-gray-500 dark:text-gray-400">
                {{ formatTime(message.timestamp) }}
              </span>
            }
          </div>
          <div class="text-gray-800 dark:text-gray-200 whitespace-pre-wrap leading-relaxed">
            {{ message.content }}
          </div>
        </div>
      </div>
    </div>
  }

  @if (isTyping()) {
    <div class="message-bubble message-assistant animate-fade-in-up">
      <div class="flex items-center space-x-3">
          <div class="avatar avatar-assistant">
            <i class="fas fa-robot w-5 h-5 text-white" aria-hidden="true"></i>
          </div>
        <div class="flex items-center space-x-2">
          <span class="text-sm font-semibold text-gray-900 dark:text-gray-100">Assistant</span>
          <span class="text-gray-600 dark:text-gray-400 text-sm">is typing</span>
          <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      </div>
    </div>
  }
</div>
